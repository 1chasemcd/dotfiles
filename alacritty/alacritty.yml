# Font configuration (changes require restart)
font:
    # The size to use.
    size: 11
    # The normal (roman) font face to use.
    normal:
        family: FiraCode Nerd Font Mono
        style: Regular

    # The bold font face
    bold:
        family: FiraCode Nerd Font Mono
        style: Bold

    # The italic font face
    italic:
        family: FiraCode Nerd Font Mono
        style: Italic

window:
    padding:
        x: 10
        y: 10

    dynamic_padding: false

